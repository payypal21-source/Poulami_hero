<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Poulami Pal</title>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.5/gsap.min.js"></script>
  <style>
    *, *::before, *::after {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    html, body {
      width: 100%;
      height: 100%;
      background: transparent;
      display: flex;
      align-items: center;
      justify-content: center;
      overflow: hidden;
    }

    .scene {
      perspective: 900px;
      perspective-origin: center center;
      display: flex;
      align-items: center;
      justify-content: center;
      width: 100vw;
      height: 100vh;
    }

    .tilt-wrapper {
      transform-style: preserve-3d;
      will-change: transform;
      display: flex;
      align-items: center;
      justify-content: center;
      filter: drop-shadow(0px 30px 60px rgba(236, 72, 153, 0.25));
    }

    .tilt-wrapper img {
      width: clamp(320px, 60vw, 780px);
      height: auto;
      display: block;
      pointer-events: none;
      user-select: none;
      filter: drop-shadow(0 0 40px rgba(236, 72, 153, 0.15));
    }
  </style>
</head>
<body>

  <div class="scene" id="scene">
    <div class="tilt-wrapper" id="tiltEl">
      <!--
        REPLACE src BELOW with your ImgBB or hosted image URL
        e.g. src="https://i.ibb.co/xxxxxxx/poulami-pal.png"
      -->
      <img
        src="https://cdn.shopify.com/s/files/1/0604/6957/5837/files/ChatGPT_Image_Mar_14__2026__05_54_05_PM_1-removebg-preview.png?v=1782907836"
        alt="Poulami Pal"
        draggable="false"
      />
    </div>
  </div>

  <script>
    const tiltEl = document.getElementById('tiltEl');

    const MAX_TILT    = 22;
    const SMOOTHNESS  = 0.08;
    const RETURN_EASE = 'power3.out';
    const RETURN_DUR  = 1.2;

    let currentX = 0;
    let currentY = 0;
    let targetX  = 0;
    let targetY  = 0;
    let rafId    = null;

    function lerp(start, end, t) {
      return start + (end - start) * t;
    }

    function animate() {
      currentX = lerp(currentX, targetX, SMOOTHNESS);
      currentY = lerp(currentY, targetY, SMOOTHNESS);

      gsap.set(tiltEl, {
        rotateX: currentX,
        rotateY: currentY,
        transformPerspective: 900,
        transformOrigin: 'center center',
      });

      const shadowX    = currentY * 1.2;
      const shadowY    = -currentX * 1.2;
      const shadowBlur = 50 + Math.abs(currentX + currentY) * 0.8;
      tiltEl.style.filter = `drop-shadow(${shadowX}px ${shadowY + 30}px ${shadowBlur}px rgba(236,72,153,0.3))`;

      rafId = requestAnimationFrame(animate);
    }

    function onMouseMove(e) {
      const rect    = tiltEl.getBoundingClientRect();
      const centerX = rect.left + rect.width  / 2;
      const centerY = rect.top  + rect.height / 2;

      const normX =  (e.clientX - centerX) / (window.innerWidth  / 2);
      const normY =  (e.clientY - centerY) / (window.innerHeight / 2);

      targetY =  normX * MAX_TILT;
      targetX = -normY * MAX_TILT;
    }

    function onMouseLeave() {
      targetX = 0;
      targetY = 0;

      cancelAnimationFrame(rafId);
      rafId = null;

      gsap.to(tiltEl, {
        rotateX: 0,
        rotateY: 0,
        duration: RETURN_DUR,
        ease: RETURN_EASE,
        transformPerspective: 900,
        transformOrigin: 'center center',
        onUpdate: () => {
          const rx = gsap.getProperty(tiltEl, 'rotateX');
          const ry = gsap.getProperty(tiltEl, 'rotateY');
          const shadowX    = ry * 1.2;
          const shadowY    = -rx * 1.2;
          const shadowBlur = 50 + Math.abs(rx + ry) * 0.8;
          tiltEl.style.filter = `drop-shadow(${shadowX}px ${shadowY + 30}px ${shadowBlur}px rgba(236,72,153,0.3))`;
        },
        onComplete: () => {
          currentX = 0;
          currentY = 0;
        }
      });
    }

    function onMouseEnter() {
      gsap.killTweensOf(tiltEl);
      if (!rafId) rafId = requestAnimationFrame(animate);
    }

    document.addEventListener('mousemove',  onMouseMove);
    document.addEventListener('mouseleave', onMouseLeave);
    document.addEventListener('mouseenter', onMouseEnter);

    rafId = requestAnimationFrame(animate);
  </script>

</body>
</html>
